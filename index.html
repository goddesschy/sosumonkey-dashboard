:root{
  --bg0:#0a0c0f;--bg1:#111318;--bg2:#181c23;--bg3:#1f2430;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --t0:#f0f2f5;--t1:#a8adb8;--t2:#5c6070;

*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg0);color:var(--t0);font-family:var(--sans);font-size:14px;line-height:1.5;min-height:100vh;}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);background:var(--bg1);position:sticky;top:0;z-index:100;}
.hdr-l{display:flex;align-items:center;gap:12px;}
.logo{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;}
.logo-t{font-size:15px;font-weight:700;letter-spacing:-.3px;}
.logo-s{font-size:10px;color:var(--t2);font-family:var(--mono);margin-top:1px;}
.hdr-r{display:flex;align-items:center;gap:10px;}
.nav{display:flex;gap:2px;background:var(--bg2);padding:3px;border-radius:9px;}
.nav-btn{padding:5px 13px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;color:var(--t1);border:none;background:none;transition:.15s;}
.nav-btn.on{background:var(--bg3);color:var(--t0);}
.ref-btn{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:7px;background:var(--bg3);border:1px solid var(--border2);color:var(--t1);font-size:11px;cursor:pointer;font-family:var(--mono);transition:.15s;}
.ref-btn:hover{border-color:var(--accent);color:var(--accent);}
.upd{font-family:var(--mono);font-size:10px;color:var(--t2);}
.setup-banner{background:rgba(79,142,247,.08);border:1px solid rgba(79,142,247,.25);border-radius:10px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px;}
.setup-banner.ok{background:rgba(34,197,94,.06);border-color:rgba(34,197,94,.2);}
.setup-input{flex:1;padding:7px 11px;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;color:var(--t0);font-family:var(--mono);font-size:11px;outline:none;}
.setup-input:focus{border-color:var(--accent);}
.setup-btn{padding:7px 14px;border-radius:7px;background:var(--accent);border:none;color:#fff;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;}
