<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>소수몽키 종목 분석기 v3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --text2: #8b949e;
    --text3: #6e7681;
    --green: #3fb950;
    --green-bg: rgba(63,185,80,0.1);
    --yellow: #d29922;
    --yellow-bg: rgba(210,153,34,0.1);
    --red: #f85149;
    --red-bg: rgba(248,81,73,0.1);
    --blue: #58a6ff;
    --blue-bg: rgba(88,166,255,0.1);
    --purple: #bc8cff;
    --accent: #1f6feb;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  /* NAV */
  .nav {
    position: sticky; top: 0; z-index: 100;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex; align-items: center; gap: 0;
  }
  .nav-logo {
    font-weight: 900; font-size: 15px;
    color: var(--text); padding: 14px 20px 14px 0;
    border-right: 1px solid var(--border);
    margin-right: 8px; white-space: nowrap;
  }
  .nav-logo span { color: var(--blue); }
  .nav-tabs { display: flex; gap: 0; flex: 1; }
  .nav-tab {
    padding: 14px 16px; font-size: 14px; font-weight: 500;
    color: var(--text2); cursor: pointer; border: none; background: none;
    border-bottom: 2px solid transparent; transition: all 0.2s;
    white-space: nowrap;
  }
  .nav-tab:hover { color: var(--text); }
  .nav-tab.active { color: var(--text); border-bottom-color: var(--blue); }
  .nav-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .api-status { font-size: 12px; padding: 4px 10px; border-radius: 20px; font-weight: 500; }
  .api-status.ok { background: var(--green-bg); color: var(--green); }
  .api-status.none { background: var(--red-bg); color: var(--red); }
  .settings-btn {
    padding: 6px 14px; font-size: 13px; border-radius: 6px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text2); cursor: pointer; transition: all 0.2s;
  }
  .settings-btn:hover { background: var(--border); color: var(--text); }

  /* MAIN */
  .main { max-width: 1100px; margin: 0 auto; padding: 28px 20px; }

  /* TABS CONTENT */
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* SEARCH */
  .search-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 24px; margin-bottom: 20px;
  }
  .search-row { display: flex; gap: 10px; margin-bottom: 16px; }
  .search-input {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); padding: 12px 16px; border-radius: 8px;
    font-size: 16px; font-family: 'JetBrains Mono', monospace; font-weight: 600;
    transition: border-color 0.2s; outline: none; letter-spacing: 1px;
    text-transform: uppercase;
  }
  .search-input::placeholder { font-family: 'Noto Sans KR', sans-serif; font-weight: 400; letter-spacing: 0; text-transform: none; font-size: 14px; color: var(--text3); }
  .search-input:focus { border-color: var(--blue); }
  .search-btn {
    padding: 12px 28px; background: var(--accent); color: #fff;
    border: none; border-radius: 8px; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .search-btn:hover { background: #388bfd; }
  .search-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .quick-btns { display: flex; flex-wrap: wrap; gap: 8px; }
  .quick-btn {
    padding: 6px 14px; font-size: 13px; font-weight: 500;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text2); border-radius: 6px; cursor: pointer; transition: all 0.2s;
    font-family: 'JetBrains Mono', monospace;
  }
  .quick-btn:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-bg); }

  /* ERROR */
  .error-box {
    background: var(--red-bg); border: 1px solid var(--red);
    color: var(--red); padding: 12px 16px; border-radius: 8px;
    margin-top: 12px; font-size: 14px; display: none;
  }
  .error-box.show { display: block; }

  /* LOADING */
  .loading-box {
    text-align: center; padding: 60px 20px; display: none;
  }
  .loading-box.show { display: block; }
  .spinner {
    width: 36px; height: 36px; border: 3px solid var(--border);
    border-top-color: var(--blue); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-steps { display: flex; flex-direction: column; gap: 6px; margin-top: 16px; align-items: center; }
  .loading-step { font-size: 13px; color: var(--text3); }
  .loading-step.active { color: var(--blue); }
  .loading-step.done { color: var(--green); }

  /* STOCK HEADER */
  .stock-header {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 24px; margin-bottom: 16px;
    display: flex; justify-content: space-between; align-items: flex-start; gap: 20px;
    flex-wrap: wrap;
  }
  .stock-name { font-size: 28px; font-weight: 900; }
  .stock-full-name { color: var(--text2); font-size: 15px; margin: 4px 0 8px; }
  .stock-badges { display: flex; gap: 6px; flex-wrap: wrap; }
  .badge {
    padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600;
  }
  .badge-blue { background: var(--blue-bg); color: var(--blue); border: 1px solid rgba(88,166,255,0.3); }
  .badge-purple { background: rgba(188,140,255,0.1); color: var(--purple); border: 1px solid rgba(188,140,255,0.3); }
  .badge-yellow { background: var(--yellow-bg); color: var(--yellow); border: 1px solid rgba(210,153,34,0.3); }
  .stock-price-block { text-align: right; }
  .price-big {
    font-size: 36px; font-weight: 900; font-family: 'JetBrains Mono', monospace;
  }
  .price-change { font-size: 16px; font-weight: 600; margin-top: 4px; }
  .price-change.up { color: var(--green); }
  .price-change.down { color: var(--red); }
  .stock-meta-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 12px; margin-top: 16px;
  }
  .meta-item {
    background: var(--surface2); border-radius: 8px; padding: 12px;
    border: 1px solid var(--border);
  }
  .meta-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .meta-value { font-size: 16px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
  .meta-value.green { color: var(--green); }
  .meta-value.red { color: var(--red); }
  .meta-value.yellow { color: var(--yellow); }

  /* SIGNAL BANNER */
  .signal-banner {
    border-radius: 12px; padding: 20px 24px; margin-bottom: 16px;
    display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;
  }
  .signal-banner.green { background: var(--green-bg); border: 1px solid rgba(63,185,80,0.3); }
  .signal-banner.yellow { background: var(--yellow-bg); border: 1px solid rgba(210,153,34,0.3); }
  .signal-banner.red { background: var(--red-bg); border: 1px solid rgba(248,81,73,0.3); }
  .signal-text { font-size: 20px; font-weight: 900; }
  .signal-text.green { color: var(--green); }
  .signal-text.yellow { color: var(--yellow); }
  .signal-text.red { color: var(--red); }
  .signal-scores { display: flex; gap: 20px; flex-wrap: wrap; }
  .score-pill { text-align: center; }
  .score-num { font-size: 28px; font-weight: 900; font-family: 'JetBrains Mono', monospace; }
  .score-label { font-size: 11px; color: var(--text2); }

  /* 2-COL LAYOUT */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  @media (max-width: 720px) { .two-col { grid-template-columns: 1fr; } }

  /* CHECKLIST */
  .checklist-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden; margin-bottom: 16px;
  }
  .checklist-card-header {
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    cursor: pointer; user-select: none;
  }
  .checklist-card-header:hover { background: var(--surface2); }
  .checklist-title { font-size: 15px; font-weight: 700; }
  .checklist-score-badge {
    font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 20px;
  }
  .checklist-card-body { padding: 12px 16px; }
  .chapter-group { margin-bottom: 16px; }
  .chapter-title {
    font-size: 12px; font-weight: 700; color: var(--text3);
    text-transform: uppercase; letter-spacing: 0.5px;
    padding: 8px 0 6px; border-bottom: 1px solid var(--border); margin-bottom: 8px;
  }
  .check-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 8px 10px; border-radius: 6px; margin-bottom: 4px;
    transition: background 0.15s;
  }
  .check-item:hover { background: var(--surface2); }
  .check-icon { flex-shrink: 0; width: 18px; height: 18px; margin-top: 1px; }
  .check-icon.pass { color: var(--green); }
  .check-icon.warning { color: var(--yellow); }
  .check-icon.fail { color: var(--red); }
  .check-icon.na { color: var(--text3); }
  .check-name { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.3; }
  .check-reason { font-size: 12px; color: var(--text2); margin-top: 2px; line-height: 1.4; }

  /* NEWS CARD */
  .news-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 0; overflow: hidden; margin-bottom: 16px;
  }
  .news-header {
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    font-size: 15px; font-weight: 700;
  }
  .news-item {
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    display: flex; gap: 12px; align-items: flex-start;
    transition: background 0.15s; cursor: pointer;
  }
  .news-item:hover { background: var(--surface2); }
  .news-item:last-child { border-bottom: none; }
  .news-sentiment {
    flex-shrink: 0; width: 8px; height: 8px; border-radius: 50%;
    margin-top: 6px;
  }
  .news-sentiment.positive { background: var(--green); }
  .news-sentiment.neutral { background: var(--text3); }
  .news-sentiment.negative { background: var(--red); }
  .news-title { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.4; }
  .news-meta { font-size: 11px; color: var(--text3); margin-top: 3px; }

  /* ANALYST */
  .analyst-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px; margin-bottom: 16px;
  }
  .analyst-header { font-size: 15px; font-weight: 700; margin-bottom: 16px; }
  .analyst-bar { margin-bottom: 12px; }
  .analyst-label { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; }
  .analyst-bar-track {
    background: var(--surface2); border-radius: 4px; height: 8px; overflow: hidden;
  }
  .analyst-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
  .analyst-target {
    background: var(--surface2); border-radius: 8px; padding: 12px 16px;
    display: flex; justify-content: space-between; align-items: center; margin-top: 12px;
  }
  .analyst-target-label { font-size: 12px; color: var(--text2); }
  .analyst-target-price { font-size: 18px; font-weight: 700; font-family: 'JetBrains Mono', monospace; color: var(--blue); }
  .analyst-upside { font-size: 12px; font-weight: 600; }

  /* PORTFOLIO TAB */
  .port-add-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px; margin-bottom: 20px;
  }
  .port-add-title { font-size: 15px; font-weight: 700; margin-bottom: 16px; }
  .port-form-row { display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 10px; align-items: end; }
  @media (max-width: 600px) { .port-form-row { grid-template-columns: 1fr 1fr; } }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-label { font-size: 12px; color: var(--text2); font-weight: 500; }
  .form-input {
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 9px 12px; border-radius: 6px; font-size: 14px; outline: none;
    font-family: 'Noto Sans KR', sans-serif; transition: border-color 0.2s;
  }
  .form-input:focus { border-color: var(--blue); }
  .add-btn {
    padding: 9px 20px; background: var(--accent); color: #fff;
    border: none; border-radius: 6px; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: background 0.2s; white-space: nowrap;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .add-btn:hover { background: #388bfd; }
  .port-table-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden; margin-bottom: 20px;
  }
  .port-table { width: 100%; border-collapse: collapse; }
  .port-table th {
    padding: 12px 16px; font-size: 11px; font-weight: 600; color: var(--text3);
    text-transform: uppercase; letter-spacing: 0.5px; background: var(--surface2);
    text-align: left; border-bottom: 1px solid var(--border);
  }
  .port-table td {
    padding: 12px 16px; font-size: 14px; border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  .port-table tr:last-child td { border-bottom: none; }
  .port-table tr:hover td { background: var(--surface2); }
  .port-ticker { font-family: 'JetBrains Mono', monospace; font-weight: 700; color: var(--blue); }
  .port-delete {
    background: none; border: 1px solid var(--border); color: var(--text3);
    padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px;
    transition: all 0.2s;
  }
  .port-delete:hover { border-color: var(--red); color: var(--red); }

  /* MEMO TAB */
  .memo-grid { display: grid; grid-template-columns: 300px 1fr; gap: 16px; }
  @media (max-width: 760px) { .memo-grid { grid-template-columns: 1fr; } }
  .memo-list-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden;
  }
  .memo-list-header {
    padding: 14px 16px; border-bottom: 1px solid var(--border);
    font-size: 14px; font-weight: 700; display: flex; justify-content: space-between; align-items: center;
  }
  .memo-list-items { max-height: calc(100vh - 260px); overflow-y: auto; }
  .memo-list-item {
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background 0.15s;
  }
  .memo-list-item:hover, .memo-list-item.active { background: var(--surface2); }
  .memo-list-item:last-child { border-bottom: none; }
  .memo-item-ticker { font-family: 'JetBrains Mono', monospace; font-weight: 700; color: var(--blue); font-size: 14px; }
  .memo-item-preview { font-size: 12px; color: var(--text2); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .memo-item-date { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .memo-editor-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden;
  }
  .memo-editor-header {
    padding: 14px 16px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .memo-editor-title { font-size: 14px; font-weight: 700; }
  .memo-save-btn {
    padding: 6px 16px; background: var(--accent); color: #fff;
    border: none; border-radius: 6px; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: background 0.2s;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .memo-save-btn:hover { background: #388bfd; }
  .memo-ticker-input {
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 10px 14px; font-size: 15px; font-family: 'JetBrains Mono', monospace;
    font-weight: 700; width: 100%; outline: none; border-bottom: 1px solid var(--border);
    text-transform: uppercase; letter-spacing: 1px;
  }
  .memo-ticker-input:focus { border-color: var(--blue); }
  .memo-textarea {
    background: var(--bg); border: none; color: var(--text);
    padding: 16px; font-size: 14px; width: 100%; min-height: 300px;
    resize: vertical; outline: none; font-family: 'Noto Sans KR', sans-serif;
    line-height: 1.7;
  }
  .memo-toolbar { padding: 10px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; flex-wrap: wrap; }
  .memo-template-btn {
    padding: 4px 12px; font-size: 12px; background: var(--surface2);
    border: 1px solid var(--border); color: var(--text2); border-radius: 4px;
    cursor: pointer; transition: all 0.2s; font-family: 'Noto Sans KR', sans-serif;
  }
  .memo-template-btn:hover { border-color: var(--blue); color: var(--blue); }
  .memo-empty { padding: 60px 20px; text-align: center; color: var(--text3); font-size: 14px; }

  /* SETTINGS MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    z-index: 200; display: none; align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 28px; width: 100%; max-width: 480px;
  }
  .modal-title { font-size: 18px; font-weight: 800; margin-bottom: 8px; }
  .modal-desc { font-size: 13px; color: var(--text2); margin-bottom: 20px; line-height: 1.6; }
  .modal-label { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 6px; display: block; }
  .modal-input {
    width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 11px 14px; border-radius: 8px; font-size: 14px; outline: none;
    font-family: 'JetBrains Mono', monospace; transition: border-color 0.2s; margin-bottom: 16px;
  }
  .modal-input:focus { border-color: var(--blue); }
  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 8px; }
  .modal-cancel {
    padding: 9px 20px; background: var(--surface2); border: 1px solid var(--border);
    color: var(--text2); border-radius: 8px; font-size: 14px; cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .modal-save {
    padding: 9px 20px; background: var(--accent); color: #fff;
    border: none; border-radius: 8px; font-size: 14px; font-weight: 600;
    cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
  }
  .modal-save:hover { background: #388bfd; }
  .modal-link { color: var(--blue); font-size: 13px; text-decoration: none; }
  .modal-link:hover { text-decoration: underline; }

  /* UTIL */
  .section-title { font-size: 15px; font-weight: 700; margin-bottom: 14px; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text3); font-size: 14px; }
  .divider { height: 1px; background: var(--border); margin: 16px 0; }
  .collapse-icon { transition: transform 0.2s; }
  .collapsed .collapse-icon { transform: rotate(-90deg); }
  .data-tag { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 500; }
  .data-tag.live { background: var(--green-bg); color: var(--green); }
  .data-tag.cached { background: var(--yellow-bg); color: var(--yellow); }
  .data-tag.calc { background: var(--blue-bg); color: var(--blue); }
  .no-data { color: var(--text3); font-size: 12px; font-style: italic; }
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-logo">소수몽키 <span>종목 분석기</span></div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchTab('analyze')">🔍 종목 분석</button>
    <button class="nav-tab" onclick="switchTab('portfolio')">📊 포트폴리오</button>
    <button class="nav-tab" onclick="switchTab('memo')">📝 메모</button>
  </div>
  <div class="nav-right">
    <span class="api-status none" id="apiStatusBadge">API 키 없음</span>
    <button class="settings-btn" onclick="openSettings()">⚙️ 설정</button>
  </div>
</nav>

<!-- TABS -->
<div class="main">

  <!-- ===== ANALYZE TAB ===== -->
  <div class="tab-content active" id="tab-analyze">
    <div class="search-card">
      <div class="search-row">
        <input type="text" class="search-input" id="tickerInput" placeholder="티커 입력 (예: AAPL, NVDA, SOXL)" maxlength="10" />
        <button class="search-btn" id="searchBtn" onclick="handleSearch()">
          <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          분석
        </button>
      </div>
      <div class="quick-btns">
        <span style="font-size:12px;color:var(--text3);align-self:center;">빠른 선택:</span>
        <button class="quick-btn" onclick="quickSelect('SOXL')">SOXL</button>
        <button class="quick-btn" onclick="quickSelect('UNH')">UNH</button>

<script>
// ============================================================
// STATE
// ============================================================
let API_KEY = '';
const CACHE = new Map(); // key -> { data, ts }
const CACHE_TTL = 30 * 60 * 1000; // 30분

let portfolio = []; // { ticker, qty, avgPrice, currentPrice, name }
let memos = [];     // { id, ticker, text, date }
let currentMemoId = null;

// ============================================================
// INIT
// ============================================================
(function init() {
  const saved = sessionStorage.getItem('av_key');
  if (saved) setApiKey(saved);

  portfolio = JSON.parse(sessionStorage.getItem('portfolio') || '[]');
  memos = JSON.parse(sessionStorage.getItem('memos') || '[]');
  renderPortfolio();
  renderMemoList();

  document.getElementById('tickerInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleSearch();
  });
})();

function setApiKey(key) {
  API_KEY = key.trim();
  const badge = document.getElementById('apiStatusBadge');
  if (API_KEY) {
    badge.textContent = '✓ API 연결됨';
    badge.className = 'api-status ok';
    document.getElementById('apiKeyInput').value = API_KEY;
  } else {
    badge.textContent = 'API 키 없음';
    badge.className = 'api-status none';
  }
}

function openSettings() {
  document.getElementById('apiKeyInput').value = API_KEY;
  document.getElementById('settingsModal').classList.add('show');
}
function closeSettings() {
  document.getElementById('settingsModal').classList.remove('show');
}
function saveSettings() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key) { alert('API 키를 입력해주세요.'); return; }
  setApiKey(key);
  sessionStorage.setItem('av_key', key);
  closeSettings();
}
document.getElementById('settingsModal').addEventListener('click', function(e) {
  if (e.target === this) closeSettings();
});

// ============================================================
// TAB
// ============================================================
function switchTab(name) {
  document.querySelectorAll('.nav-tab').forEach((t, i) => {
    const tabs = ['analyze','portfolio','memo'];
    t.classList.toggle('active', tabs[i] === name);
  });
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
}

// ============================================================
// API HELPERS
// ============================================================
function cacheGet(key) {
  const item = CACHE.get(key);
  if (!item) return null;
  if (Date.now() - item.ts > CACHE_TTL) { CACHE.delete(key); return null; }
  return item.data;
}
function cacheSet(key, data) {
  CACHE.set(key, { data, ts: Date.now() });
}

async function avFetch(params, label) {
  if (!API_KEY) throw new Error('API 키가 없습니다. 설정에서 입력해주세요.');
  const cacheKey = JSON.stringify(params);
  const cached = cacheGet(cacheKey);
  if (cached) return { data: cached, cached: true };

  const url = 'https://www.alphavantage.co/query?' +
    Object.entries({ ...params, apikey: API_KEY }).map(([k, v]) => `${k}=${encodeURIComponent(v)}`).join('&');

  const res = await fetch(url);
  if (!res.ok) throw new Error(`네트워크 오류 (${res.status})`);
  const data = await res.json();

  if (data['Error Message']) throw new Error('종목을 찾을 수 없습니다: ' + data['Error Message']);
  if (data['Information']) {
    if (data['Information'].includes('per day') || data['Information'].includes('limit')) {
      throw new Error('API 일일 한도(25회) 초과. 내일 다시 이용해주세요.\n새 API 키 발급: alphavantage.co/support/#api-key');
    }
    if (data['Information'].includes('per minute') || data['Information'].includes('minute')) {
      throw new Error('API 분당 요청 한도(5회) 초과. 1분 후 다시 시도해주세요.');
    }
  }
  if (data['Note']) throw new Error('API 요청 한도. 잠시 후 다시 시도하세요.');

  cacheSet(cacheKey, data);
  return { data, cached: false };
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function setLoadingStep(steps, idx) {
  const els = document.querySelectorAll('#loadingSteps .loading-step');
  els.forEach((el, i) => {
    if (i < idx) el.classList.add('done');
    else if (i === idx) el.classList.add('active');
  });
}

// ============================================================
// MAIN FETCH
// ============================================================
async function fetchStockData(symbol) {
  const steps = ['현재가 조회', '회사 정보', '이동평균 계산', '뉴스 검색'];
  document.getElementById('loadingSteps').innerHTML = steps.map(s =>
    `<div class="loading-step">${s}</div>`).join('');

  setLoadingStep(steps, 0);
  await sleep(100);

  // 1. Global Quote
  const { data: quoteData } = await avFetch({ function: 'GLOBAL_QUOTE', symbol });
  const quote = quoteData['Global Quote'];
  if (!quote || !quote['05. price']) throw new Error('주가 데이터 없음. 티커를 확인해주세요.');
  setLoadingStep(steps, 1);
  await sleep(1200);

  // 2. Overview
  const { data: overview } = await avFetch({ function: 'OVERVIEW', symbol });
  setLoadingStep(steps, 2);
  await sleep(1200);

  // 3. Moving Averages via SMA
  let ma50 = null, ma200 = null;
  try {
    const { data: sma50data } = await avFetch({ function: 'SMA', symbol, interval: 'daily', time_period: '50', series_type: 'close' });
    const { data: sma200data } = await avFetch({ function: 'SMA', symbol, interval: 'daily', time_period: '200', series_type: 'close' });
    const sma50vals = sma50data['Technical Analysis: SMA'];
    const sma200vals = sma200data['Technical Analysis: SMA'];
    if (sma50vals) { const k = Object.keys(sma50vals)[0]; ma50 = parseFloat(sma50vals[k]['SMA']); }
    if (sma200vals) { const k = Object.keys(sma200vals)[0]; ma200 = parseFloat(sma200vals[k]['SMA']); }
  } catch(e) { console.warn('MA fetch failed:', e.message); }
  setLoadingStep(steps, 3);
  await sleep(1200);

  // 4. News Sentiment
  let news = [];
  try {
    const { data: newsData } = await avFetch({ function: 'NEWS_SENTIMENT', tickers: symbol, limit: '6', sort: 'LATEST' });
    if (newsData.feed) {
      news = newsData.feed.slice(0, 6).map(n => ({
        title: n.title,
        source: n.source,
        url: n.url,
        time: n.time_published,
        sentiment: n.overall_sentiment_label,
        score: parseFloat(n.overall_sentiment_score || 0)
      }));
    }
  } catch(e) { console.warn('News fetch failed:', e.message); }

  // Parse
  const price = parseFloat(quote['05. price']);
  const prevClose = parseFloat(quote['08. previous close']);
  const change = parseFloat(quote['09. change']);
  const changePct = parseFloat((quote['10. change percent'] || '0%').replace('%', ''));
  const assetType = overview.AssetType || '';
  const isETF = assetType === 'ETF' || symbol.includes('3X') || ['SOXL','TQQQ','UPRO','TECL','SOXS','SPXL'].includes(symbol.toUpperCase());

  const week52High = overview['52WeekHigh'] ? parseFloat(overview['52WeekHigh']) : null;
  const week52Low = overview['52WeekLow'] ? parseFloat(overview['52WeekLow']) : null;

  return {
    ticker: symbol.toUpperCase(),
    name: overview.Name || symbol,
    type: isETF ? 'ETF' : '주식',
    assetType,
    price,
    prevClose,
    change,
    changePct,
    marketCap: parseInt(overview.MarketCapitalization) || 0,
    volume: parseInt(quote['06. volume']) || 0,
    avgVolume: parseInt(overview.Shares_Out) || 0,
    pe: overview.PERatio && overview.PERatio !== 'None' ? parseFloat(overview.PERatio) : null,
    forwardPE: overview.ForwardPE && overview.ForwardPE !== 'None' ? parseFloat(overview.ForwardPE) : null,
    pb: overview.PriceToBookRatio && overview.PriceToBookRatio !== 'None' ? parseFloat(overview.PriceToBookRatio) : null,
    ps: overview.PriceToSalesRatioTTM && overview.PriceToSalesRatioTTM !== 'None' ? parseFloat(overview.PriceToSalesRatioTTM) : null,
    eps: overview.EPS && overview.EPS !== 'None' ? parseFloat(overview.EPS) : null,
    dividend: overview.DividendPerShare && overview.DividendPerShare !== 'None' ? parseFloat(overview.DividendPerShare) : 0,
    dividendYield: overview.DividendYield && overview.DividendYield !== 'None' ? parseFloat(overview.DividendYield) * 100 : 0,
    week52High,
    week52Low,
    ma50,
    ma200,
    sector: overview.Sector || '',
    industry: overview.Industry || '',
    roe: overview.ReturnOnEquityTTM && overview.ReturnOnEquityTTM !== 'None' ? parseFloat(overview.ReturnOnEquityTTM) * 100 : null,
    debtToEquity: overview.DebtToEquity && overview.DebtToEquity !== 'None' ? parseFloat(overview.DebtToEquity) : null,
    profitMargin: overview.ProfitMargin && overview.ProfitMargin !== 'None' ? parseFloat(overview.ProfitMargin) * 100 : null,
    revGrowthYoY: overview.RevenueGrowthYoY && overview.RevenueGrowthYoY !== 'None' ? parseFloat(overview.RevenueGrowthYoY) * 100 : null,
    analystTarget: overview.AnalystTargetPrice && overview.AnalystTargetPrice !== 'None' ? parseFloat(overview.AnalystTargetPrice) : null,
    analystRatingBuy: parseInt(overview.AnalystRatingStrongBuy || 0) + parseInt(overview.AnalystRatingBuy || 0),
    analystRatingHold: parseInt(overview.AnalystRatingHold || 0),
    analystRatingSell: parseInt(overview.AnalystRatingStrongSell || 0) + parseInt(overview.AnalystRatingSell || 0),
    beta: overview.Beta && overview.Beta !== 'None' ? parseFloat(overview.Beta) : null,
    description: overview.Description || '',
    news,
    fetchedAt: new Date()
  };
}

// ============================================================
// EVALUATE
// ============================================================
function evaluateStock(s) {
  const isETF = s.type === 'ETF';
  const basic = [];
  const master = [];

  // --- BASIC ---

  // Ch1: 미국 시장
  basic.push({
    chapter: 'Ch.1 미국 시장',
    items: [
      { name: '미국 시장 투자 여부', status: 'pass', reason: '미국 상장 종목 확인' },
      { name: '글로벌 1등 기업/ETF', status: s.marketCap > 1e11 ? 'pass' : s.marketCap > 1e10 ? 'warning' : 'fail',
        reason: s.marketCap > 1e11 ? `시총 ${fmtCap(s.marketCap)} — 글로벌 대형주` : s.marketCap > 1e10 ? `시총 ${fmtCap(s.marketCap)} — 중형주` : `시총 ${fmtCap(s.marketCap)} — 소형주 주의` }
    ]
  });

  // Ch2: 종목 선별 (지갑털이/올리고폴리/아무나이겨라/굿보스)
  const expertSectors = ['Technology','Healthcare','Semiconductor','Biotechnology','Health Care'];
  const inExpert = expertSectors.some(s2 => (s.sector||'').includes(s2) || (s.industry||'').includes(s2));
  const ch2items = [
    { name: '전문 분야 종목 (지갑털이 전략)', status: inExpert ? 'pass' : 'warning',
      reason: inExpert ? `${s.sector} — 본인 전문 분야` : `${s.sector || '알 수 없음'} — 전문분야 외, 추가 학습 필요` },
    { name: '시장 지배력 (올리고폴리 전략)', status: s.marketCap > 5e11 ? 'pass' : s.marketCap > 1e11 ? 'warning' : 'fail',
      reason: s.marketCap > 5e11 ? `시총 ${fmtCap(s.marketCap)} — 압도적 시장 지배` : s.marketCap > 1e11 ? `시총 ${fmtCap(s.marketCap)} — 상위권` : `시총 ${fmtCap(s.marketCap)} — 지배력 약함` }
  ];
  if (!isETF && s.roe !== null) {
    ch2items.push({ name: 'ROE (경영 효율)', status: s.roe > 20 ? 'pass' : s.roe > 10 ? 'warning' : 'fail',
      reason: `ROE ${s.roe.toFixed(1)}%${s.roe > 20 ? ' — 우수' : s.roe > 10 ? ' — 양호' : ' — 개선 필요'}` });
  }
  if (!isETF && s.beta !== null) {
    ch2items.push({ name: '베타 (변동성)', status: s.beta < 1.5 ? 'pass' : s.beta < 2.0 ? 'warning' : 'fail',
      reason: `베타 ${s.beta.toFixed(2)}${s.beta < 1.5 ? ' — 안정적' : s.beta < 2.0 ? ' — 보통' : ' — 고변동성'}` });
  }
  basic.push({ chapter: 'Ch.2 종목 선별', items: ch2items });

  // Ch3: 매매 타이밍 (여름에 패딩/반반/현금비중)
  const ch3items = [];
  if (s.week52High && s.week52Low) {
    const pctFromHigh = (s.price / s.week52High) * 100;
    const pctFromLow = ((s.price - s.week52Low) / (s.week52High - s.week52Low)) * 100;
    ch3items.push({ name: '52주 고점 대비 (여름에 패딩 전략)', status: pctFromHigh < 75 ? 'pass' : pctFromHigh < 90 ? 'warning' : 'fail',
      reason: `고점 대비 ${pctFromHigh.toFixed(1)}% ${pctFromHigh < 75 ? '— 저점 근처, 매수 적합' : pctFromHigh < 90 ? '— 중간 구간' : '— 고점 근처, 신중'}` });
    ch3items.push({ name: '52주 레인지 위치', status: pctFromLow < 40 ? 'pass' : pctFromLow < 70 ? 'warning' : 'fail',
      reason: `52주 레인지 ${pctFromLow.toFixed(0)}% 위치 ($${s.week52Low?.toFixed(0)}~$${s.week52High?.toFixed(0)})` });
  }
  if (s.ma200) {
    ch3items.push({ name: '200일 이평선 위치', status: s.price > s.ma200 ? 'pass' : 'fail',
      reason: `200일선 $${s.ma200.toFixed(2)} — 현재 ${s.price > s.ma200 ? '상회 (상승장)' : '하회 (하락장)'}` });
  }
  basic.push({ chapter: 'Ch.3 매매 타이밍', items: ch3items });

  // Ch4: ETF 평가
  const ch4items = [];
  if (isETF) {
    ch4items.push({ name: 'ETF 여부 확인', status: 'pass', reason: 'ETF 종목 — ETF 기준 체크리스트 적용' });
    const isLeverage = ['SOXL','TQQQ','UPRO','TECL','SPXL','LABU','FNGU','WEBL'].includes(s.ticker);
    ch4items.push({ name: '레버리지 ETF 여부', status: isLeverage ? 'warning' : 'pass',
      reason: isLeverage ? '3배 레버리지 ETF — 단기 보유 전용, 장기 보유 주의' : '일반 ETF — 장기 보유 적합' });
    ch4items.push({ name: 'AUM (운용 규모)', status: s.marketCap > 1e9 ? 'pass' : s.marketCap > 1e8 ? 'warning' : 'fail',
      reason: `운용규모 ${fmtCap(s.marketCap)}${s.marketCap > 1e9 ? ' — 충분한 유동성' : ' — 유동성 낮을 수 있음'}` });
  } else {
    ch4items.push({ name: 'ETF 여부', status: 'pass', reason: '개별 주식 — Ch.4 ETF 항목 해당 없음' });
  }
  basic.push({ chapter: 'Ch.4 ETF 평가', items: ch4items });

  // Ch5: 배당
  const ch5items = [];
  if (s.dividend > 0) {
    ch5items.push({ name: '배당 지급 여부', status: 'pass', reason: `연 $${s.dividend.toFixed(2)} 배당 지급` });
    ch5items.push({ name: '배당수익률', status: s.dividendYield > 2.5 ? 'pass' : s.dividendYield > 1 ? 'warning' : 'fail',
      reason: `${s.dividendYield.toFixed(2)}%${s.dividendYield > 2.5 ? ' — 고배당' : s.dividendYield > 1 ? ' — 낮은 배당' : ' — 사실상 무배당'}` });
  } else {
    ch5items.push({ name: '배당 여부', status: 'warning', reason: '무배당 종목 — 시세차익 중심 전략' });
  }
  basic.push({ chapter: 'Ch.5 배당 평가', items: ch5items });

  // Ch6: 포트폴리오 관리
  const portCount = portfolio.length;
  basic.push({ chapter: 'Ch.6 포트폴리오', items: [
    { name: '포트폴리오 종목 수', status: portCount >= 10 && portCount <= 20 ? 'pass' : portCount < 10 ? 'warning' : 'warning',
      reason: `현재 ${portCount}개 종목${portCount < 10 ? ' (10개 이상 권장)' : portCount > 20 ? ' (20개 이하 권장)' : ' — 적정'}` },
    { name: '몰빵 지수 체크', status: 'warning', reason: '포트폴리오 탭에서 한 종목 비중 20% 이하 유지 권장' }
  ]});

  // Ch7: 재무 건전성
  const ch7items = [];
  if (!isETF) {
    if (s.debtToEquity !== null) {
      ch7items.push({ name: '부채비율 (D/E)', status: s.debtToEquity < 0.5 ? 'pass' : s.debtToEquity < 1.5 ? 'warning' : 'fail',
        reason: `D/E ${s.debtToEquity.toFixed(2)}${s.debtToEquity < 0.5 ? ' — 재무 우수' : s.debtToEquity < 1.5 ? ' — 보통' : ' — 부채 과다'}` });
    }
    if (s.profitMargin !== null) {
      ch7items.push({ name: '영업이익률', status: s.profitMargin > 15 ? 'pass' : s.profitMargin > 5 ? 'warning' : 'fail',
        reason: `${s.profitMargin.toFixed(1)}%${s.profitMargin > 15 ? ' — 우수' : s.profitMargin > 5 ? ' — 양호' : ' — 개선 필요'}` });
    }
    if (s.eps !== null) {
      ch7items.push({ name: 'EPS (주당순이익)', status: s.eps > 0 ? 'pass' : 'fail',
        reason: `EPS $${s.eps.toFixed(2)}${s.eps > 0 ? ' — 흑자' : ' — 적자'}` });
    }
    if (s.revGrowthYoY !== null) {
      ch7items.push({ name: '매출 성장률', status: s.revGrowthYoY > 10 ? 'pass' : s.revGrowthYoY > 0 ? 'warning' : 'fail',
        reason: `YoY ${s.revGrowthYoY.toFixed(1)}%${s.revGrowthYoY > 10 ? ' — 성장 중' : s.revGrowthYoY > 0 ? ' — 완만한 성장' : ' — 역성장'}` });
    }
  }
  if (ch7items.length > 0) basic.push({ chapter: 'Ch.7 재무 건전성', items: ch7items });

  // --- MASTER ---

  // M Ch.1: 10년 금리 / 금융상황지수 (마스터 11강, 12강)
  // 실제 금리는 API 없어 하드코딩 (FRED 연동은 별도 필요)
  const rate10y = 4.3; // 현재 약 4.3% 수준
  master.push({ chapter: 'M Ch.1 시장 날씨 (금리/NFCI)', items: [
    { name: '10년 금리 수준 (11강)', status: rate10y < 4.0 ? 'pass' : rate10y < 4.5 ? 'warning' : 'fail',
      reason: `미국 10년 금리 약 ${rate10y}%${rate10y < 4.0 ? ' — 완화 환경' : rate10y < 4.5 ? ' — 중립 (주의)' : ' — 긴축, 비중 축소 고려'}` },
    { name: '금융상황지수 (NFCI, 12강)', status: 'warning',
      reason: 'NFCI 실시간 연동 미지원 — FRED 직접 확인 권장 (fred.stlouisfed.org)' }
  ]});

  // M Ch.2: 이동평균 신호등 (마스터 21~24강)
  const m2items = [];
  if (s.ma50 && s.ma200) {
    const goldenCross = s.ma50 > s.ma200;
    m2items.push({ name: '골든/데드크로스 (21강)', status: goldenCross ? 'pass' : 'fail',
      reason: `MA50($${s.ma50.toFixed(2)}) ${goldenCross ? '>' : '<'} MA200($${s.ma200.toFixed(2)}) — ${goldenCross ? '골든크로스, 상승 추세' : '데드크로스, 하락 추세'}` });
    m2items.push({ name: '200일선 상회 (22강)', status: s.price > s.ma200 ? 'pass' : 'fail',
      reason: `현재가 $${s.price.toFixed(2)} ${s.price > s.ma200 ? '>' : '<'} 200일선 $${s.ma200.toFixed(2)} — ${s.price > s.ma200 ? '장기 상승 구간' : '장기 하락 구간'}` });
    if (s.ma200) {
      const dev = ((s.price - s.ma200) / s.ma200) * 100;
      m2items.push({ name: '이격도 (23강)', status: Math.abs(dev) < 15 ? 'pass' : Math.abs(dev) < 25 ? 'warning' : 'fail',
        reason: `200일선 이격도 ${dev > 0 ? '+' : ''}${dev.toFixed(1)}%${Math.abs(dev) < 15 ? ' — 적정' : Math.abs(dev) < 25 ? ' — 이격 과다' : ' — 과열/냉각'}` });
    }
  } else {
    m2items.push({ name: '이동평균 데이터', status: 'na', reason: 'MA 데이터 로딩 실패 (API 한도 또는 상장 기간 부족)' });
  }
  if (s.ma50) {
    m2items.push({ name: '50일선 위치', status: s.price > s.ma50 ? 'pass' : 'fail',
      reason: `현재가 $${s.price.toFixed(2)} ${s.price > s.ma50 ? '>' : '<'} 50일선 $${s.ma50.toFixed(2)}` });
  }
  master.push({ chapter: 'M Ch.2 이동평균 신호등 (21~24강)', items: m2items });

  // M Ch.3: 적정주가 (마스터 31~34강)
  const m3items = [];
  if (!isETF) {
    if (s.pe) {
      m3items.push({ name: '시장 PER 대비 (31강)', status: s.pe < 25 ? 'pass' : s.pe < 40 ? 'warning' : 'fail',
        reason: `PER ${s.pe.toFixed(1)} (S&P500 평균 ~22)${s.pe < 25 ? ' — 적정/저평가' : s.pe < 40 ? ' — 다소 고평가' : ' — 매우 고평가'}` });
    }
    if (s.forwardPE) {
      m3items.push({ name: '선행 PER (32강)', status: s.forwardPE < 20 ? 'pass' : s.forwardPE < 35 ? 'warning' : 'fail',
        reason: `Forward PER ${s.forwardPE.toFixed(1)} — ${s.forwardPE < 20 ? '저평가' : s.forwardPE < 35 ? '적정' : '고평가'}` });
    }
    if (s.pb) {
      m3items.push({ name: 'PBR (장부가 대비, 32강)', status: s.pb < 5 ? 'pass' : s.pb < 15 ? 'warning' : 'fail',
        reason: `PBR ${s.pb.toFixed(2)}${s.pb < 5 ? ' — 저평가' : s.pb < 15 ? ' — 적정' : ' — 고평가'}` });
    }
    if (s.analystTarget && s.price) {
      const upside = ((s.analystTarget - s.price) / s.price) * 100;
      m3items.push({ name: '애널리스트 목표가 (33강)', status: upside > 15 ? 'pass' : upside > 0 ? 'warning' : 'fail',
        reason: `목표가 $${s.analystTarget.toFixed(2)} — 현재 대비 ${upside > 0 ? '+' : ''}${upside.toFixed(1)}%${upside > 15 ? ' 상승 여력' : upside > 0 ? ' 소폭 상승' : ' 하락 우려'}` });
    }
    if (s.ps) {
      m3items.push({ name: '성장주 PSR (34강)', status: s.ps < 10 ? 'pass' : s.ps < 30 ? 'warning' : 'fail',
        reason: `PSR(주가매출비율) ${s.ps.toFixed(1)}${s.ps < 10 ? ' — 적정' : s.ps < 30 ? ' — 성장주 할증 반영' : ' — 고평가 주의'}` });
    }
  } else {
    m3items.push({ name: 'ETF 평가', status: 'pass', reason: 'ETF는 PER/PBR 대신 추적 지수 성과로 평가' });
  }
  if (m3items.length > 0) master.push({ chapter: 'M Ch.3 적정주가 (31~34강)', items: m3items });

  // M Ch.4: 역발상 (마스터 41~45강)
  const vix = 18; // 실시간 미연동 — 추후 개선
  master.push({ chapter: 'M Ch.4 역발상 신호 (41~45강)', items: [
    { name: 'VIX 공포지수 (41강)', status: vix < 20 ? 'pass' : vix < 30 ? 'warning' : 'fail',
      reason: `VIX 약 ${vix}${vix < 20 ? ' — 안정 (매수 기회 낮음)' : vix < 30 ? ' — 불안 (역발상 기회)' : ' — 공포 (역발상 매수 적합)'}` },
    { name: '탐욕/공포 지수 (41강)', status: 'warning', reason: 'CNN Fear & Greed 실시간 연동 미지원 — CNN 직접 확인' },
    { name: '풋/콜 비율 (42강)', status: 'warning', reason: 'P/C Ratio 실시간 연동 미지원 — CBOE 직접 확인' },
    { name: '하이일드 스프레드 (44강)', status: 'warning', reason: 'HYG 스프레드 연동 미지원 — FRED 직접 확인' }
  ]});

  // M Ch.5: 탑20 리스트 관련 (마스터 51~53강)
  const ch5m = [];
  ch5m.push({ name: '나만의 Top20 리스트 (51강)', status: portCount > 0 ? 'pass' : 'warning',
    reason: portCount > 0 ? `현재 ${portCount}개 보유 — 포트폴리오 탭에서 관리 중` : '포트폴리오 탭에서 관심 종목을 등록해보세요' });
  if (s.week52High && s.week52Low) {
    const pct = (s.price / s.week52High) * 100;
    ch5m.push({ name: '하락장 소외주 체크 (52강)', status: pct < 70 ? 'pass' : pct < 85 ? 'warning' : 'fail',
      reason: pct < 70 ? '52주 고점 대비 -30% 이상 — 소외주 기회' : pct < 85 ? '중간 위치' : '고점 근처 — 소외주 아님' });
    ch5m.push({ name: '달리는 말 여부 (53강)', status: pct > 90 ? 'pass' : pct > 75 ? 'warning' : 'fail',
      reason: pct > 90 ? '52주 고점 90% 이상 — 모멘텀 강한 종목' : '강한 상승 모멘텀 없음' });
  }
  master.push({ chapter: 'M Ch.5 종목 발굴 (51~53강)', items: ch5m });

  return { basic, master };
}

// ============================================================
// SCORING
// ============================================================
function calcScore(checks) {
  let pass = 0, total = 0;
  checks.forEach(ch => ch.items.forEach(it => {
    if (it.status === 'na') return;
    total++;
    if (it.status === 'pass') pass++;
    else if (it.status === 'warning') pass += 0.5;
  }));
  return total === 0 ? 0 : Math.round((pass / total) * 100);
}

// ============================================================
// FORMAT HELPERS
// ============================================================
function fmtCap(v) {
  if (!v) return 'N/A';
  if (v >= 1e12) return `$${(v/1e12).toFixed(2)}T`;
  if (v >= 1e9) return `$${(v/1e9).toFixed(1)}B`;
  if (v >= 1e6) return `$${(v/1e6).toFixed(0)}M`;
  return `$${v}`;
}
function fmtVol(v) {
  if (!v) return 'N/A';
  if (v >= 1e9) return `${(v/1e9).toFixed(2)}B`;
  if (v >= 1e6) return `${(v/1e6).toFixed(1)}M`;
  if (v >= 1e3) return `${(v/1e3).toFixed(0)}K`;
  return `${v}`;
}
function fmtDate(str) {
  if (!str || str.length < 8) return str;
  return `${str.slice(0,4)}-${str.slice(4,6)}-${str.slice(6,8)} ${str.slice(9,11)}:${str.slice(11,13)}`;
}
function sentimentClass(s) {
  if (!s) return 'neutral';
  s = s.toLowerCase();
  if (s.includes('bullish') || s.includes('positive')) return 'positive';
  if (s.includes('bearish') || s.includes('negative')) return 'negative';
  return 'neutral';
}

// ============================================================
// RENDER
// ============================================================
function renderResult(s) {
  const { basic, master } = evaluateStock(s);
  const basicScore = calcScore(basic);
  const masterScore = calcScore(master);
  const overall = Math.round((basicScore + masterScore) / 2);

  let sigColor, sigText;
  if (overall >= 70) { sigColor = 'green'; sigText = '🟢 매수 적극 검토'; }
  else if (overall >= 50) { sigColor = 'yellow'; sigText = '🟡 신중한 접근'; }
  else { sigColor = 'red'; sigText = '🔴 매수 보류'; }

  const totalAnalysts = (s.analystRatingBuy||0) + (s.analystRatingHold||0) + (s.analystRatingSell||0);

  function checkIcon(status) {
    if (status === 'pass') return `<svg class="check-icon pass" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"/></svg>`;
    if (status === 'warning') return `<svg class="check-icon warning" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z"/></svg>`;
    if (status === 'fail') return `<svg class="check-icon fail" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"/></svg>`;
    return `<svg class="check-icon na" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM7 9a1 1 0 000 2h6a1 1 0 100-2H7z"/></svg>`;
  }

  function renderChecklist(title, checks, score) {
    const scoreColor = score >= 70 ? 'var(--green)' : score >= 50 ? 'var(--yellow)' : 'var(--red)';
    return `
    <div class="checklist-card">
      <div class="checklist-card-header" onclick="toggleChecklist(this)">
        <div class="checklist-title">${title}</div>
        <div style="display:flex;align-items:center;gap:8px;">
          <div style="font-size:18px;font-weight:800;font-family:'JetBrains Mono',monospace;color:${scoreColor}">${score}</div>
          <svg class="collapse-icon" width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
        </div>
      </div>
      <div class="checklist-card-body">
        ${checks.map(ch => `
          <div class="chapter-group">
            <div class="chapter-title">${ch.chapter}</div>
            ${ch.items.map(it => `
              <div class="check-item">
                ${checkIcon(it.status)}
                <div>
                  <div class="check-name">${it.name}</div>
                  <div class="check-reason">${it.reason}</div>
                </div>
              </div>
            `).join('')}
          </div>
        `).join('')}
      </div>
    </div>`;
  }

  const html = `
    <!-- HEADER -->
    <div class="stock-header">
      <div>
        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
          <div class="stock-name">${s.ticker}</div>
          <div class="stock-badges">
            <span class="badge badge-blue">${s.type}</span>
            ${s.sector ? `<span class="badge badge-purple">${s.sector}</span>` : ''}
            ${s.analystTarget ? `<span class="badge badge-yellow">목표가 $${s.analystTarget.toFixed(0)}</span>` : ''}
          </div>
        </div>
        <div class="stock-full-name">${s.name}</div>
        ${s.industry ? `<div style="font-size:12px;color:var(--text3);">${s.industry}</div>` : ''}
      </div>
      <div class="stock-price-block">
        <div class="price-big">$${s.price.toFixed(2)}</div>
        <div class="price-change ${s.change >= 0 ? 'up' : 'down'}">
          ${s.change >= 0 ? '▲' : '▼'} ${Math.abs(s.change).toFixed(2)} (${s.changePct >= 0 ? '+' : ''}${s.changePct.toFixed(2)}%)
        </div>
        <div style="font-size:11px;color:var(--text3);margin-top:4px;">업데이트 ${s.fetchedAt.toLocaleTimeString('ko-KR')}</div>
      </div>
      <div style="width:100%;">
        <div class="stock-meta-grid">
          <div class="meta-item"><div class="meta-label">시가총액</div><div class="meta-value">${fmtCap(s.marketCap)}</div></div>
          <div class="meta-item"><div class="meta-label">거래량</div><div class="meta-value">${fmtVol(s.volume)}</div></div>
          <div class="meta-item"><div class="meta-label">PER</div><div class="meta-value ${s.pe ? (s.pe<25?'green':s.pe<40?'yellow':'red') : ''}">${s.pe ? s.pe.toFixed(1) : 'N/A'}</div></div>
          <div class="meta-item"><div class="meta-label">PBR</div><div class="meta-value">${s.pb ? s.pb.toFixed(2) : 'N/A'}</div></div>
          <div class="meta-item"><div class="meta-label">52주 고점</div><div class="meta-value">$${s.week52High?.toFixed(2) ?? 'N/A'}</div></div>
          <div class="meta-item"><div class="meta-label">52주 저점</div><div class="meta-value">$${s.week52Low?.toFixed(2) ?? 'N/A'}</div></div>
          <div class="meta-item"><div class="meta-label">MA 50</div><div class="meta-value ${s.ma50 ? (s.price > s.ma50 ? 'green' : 'red') : ''}">${s.ma50 ? '$'+s.ma50.toFixed(2) : 'N/A'} <span class="data-tag calc">계산</span></div></div>
          <div class="meta-item"><div class="meta-label">MA 200</div><div class="meta-value ${s.ma200 ? (s.price > s.ma200 ? 'green' : 'red') : ''}">${s.ma200 ? '$'+s.ma200.toFixed(2) : 'N/A'} <span class="data-tag calc">계산</span></div></div>
        </div>
      </div>
    </div>

    <!-- SIGNAL -->
    <div class="signal-banner ${sigColor}">
      <div>
        <div class="signal-text ${sigColor}">${sigText}</div>
        <div style="font-size:13px;color:var(--text2);margin-top:4px;">베이직 + 마스터 클래스 체크리스트 종합 평가</div>
      </div>
      <div class="signal-scores">
        <div class="score-pill">
          <div class="score-num" style="color:${basicScore>=70?'var(--green)':basicScore>=50?'var(--yellow)':'var(--red)'}">${basicScore}</div>
          <div class="score-label">베이직</div>
        </div>
        <div style="color:var(--border);font-size:24px;align-self:center;">+</div>
        <div class="score-pill">
          <div class="score-num" style="color:${masterScore>=70?'var(--green)':masterScore>=50?'var(--yellow)':'var(--red)'}">${masterScore}</div>
          <div class="score-label">마스터</div>
        </div>
        <div style="color:var(--border);font-size:24px;align-self:center;">=</div>
        <div class="score-pill">
          <div class="score-num" style="color:${overall>=70?'var(--green)':overall>=50?'var(--yellow)':'var(--red)'}">${overall}</div>
          <div class="score-label">종합</div>
        </div>
      </div>
    </div>

    <!-- TWO COL: ANALYST + NEWS -->
    <div class="two-col">
      <!-- ANALYST -->
      <div class="analyst-card">
        <div class="analyst-header">📊 애널리스트 컨센서스</div>
        ${totalAnalysts > 0 ? `
          <div class="analyst-bar">
            <div class="analyst-label"><span style="color:var(--green)">매수 (Buy)</span><span>${s.analystRatingBuy}명</span></div>
            <div class="analyst-bar-track"><div class="analyst-bar-fill" style="width:${(s.analystRatingBuy/totalAnalysts*100).toFixed(0)}%;background:var(--green)"></div></div>
          </div>
          <div class="analyst-bar">
            <div class="analyst-label"><span style="color:var(--yellow)">보유 (Hold)</span><span>${s.analystRatingHold}명</span></div>
            <div class="analyst-bar-track"><div class="analyst-bar-fill" style="width:${(s.analystRatingHold/totalAnalysts*100).toFixed(0)}%;background:var(--yellow)"></div></div>
          </div>
          <div class="analyst-bar">
            <div class="analyst-label"><span style="color:var(--red)">매도 (Sell)</span><span>${s.analystRatingSell}명</span></div>
            <div class="analyst-bar-track"><div class="analyst-bar-fill" style="width:${(s.analystRatingSell/totalAnalysts*100).toFixed(0)}%;background:var(--red)"></div></div>
          </div>
          ${s.analystTarget ? `
          <div class="analyst-target">
            <div>
              <div class="analyst-target-label">컨센서스 목표가</div>
              <div class="analyst-target-price">$${s.analystTarget.toFixed(2)}</div>
            </div>
            <div class="analyst-upside" style="color:${((s.analystTarget-s.price)/s.price*100)>0?'var(--green)':'var(--red)'}">
              ${((s.analystTarget-s.price)/s.price*100)>0?'▲':'▼'} ${Math.abs((s.analystTarget-s.price)/s.price*100).toFixed(1)}%
              <div style="font-size:11px;color:var(--text3);font-weight:400;">현재 대비</div>
            </div>
          </div>` : ''}
        ` : `<div class="empty-state" style="padding:24px 0;">애널리스트 데이터 없음<br><span style="font-size:12px">(ETF 또는 데이터 미제공)</span></div>`}
      </div>

      <!-- NEWS -->
      <div class="news-card">
        <div class="news-header">📰 최신 뉴스 <span style="font-size:12px;color:var(--text3);font-weight:400;">최근 6건</span></div>
        ${s.news.length > 0 ? s.news.map(n => `
          <div class="news-item" onclick="window.open('${n.url}','_blank')">
            <div class="news-sentiment ${sentimentClass(n.sentiment)}"></div>
            <div>
              <div class="news-title">${n.title}</div>
              <div class="news-meta">${n.source} · ${fmtDate(n.time)}</div>
            </div>
          </div>
        `).join('') : `<div class="empty-state" style="padding:30px 0;">뉴스 데이터 없음<br><span style="font-size:12px">(API 한도 또는 데이터 미제공)</span></div>`}
      </div>
    </div>

    <!-- CHECKLISTS -->
    ${renderChecklist('📋 베이직 클래스 체크리스트 (Ch.1~7)', basic, basicScore)}
    ${renderChecklist('🎯 마스터 클래스 체크리스트 (Ch.1~5)', master, masterScore)}

    <!-- MEMO SHORTCUT -->
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:4px;">
      <div>
        <div style="font-size:14px;font-weight:600;">이 종목에 대한 메모가 있나요?</div>
        <div style="font-size:12px;color:var(--text2);margin-top:2px;">투자 근거, 목표가, 리스크를 기록해두세요</div>
      </div>
      <button class="search-btn" style="padding:8px 20px;font-size:13px;" onclick="openMemoFor('${s.ticker}')">📝 메모 작성</button>
    </div>
  `;

  document.getElementById('resultArea').innerHTML = html;
  document.getElementById('resultArea').style.display = 'block';
}

function toggleChecklist(header) {
  const card = header.parentElement;
  const body = card.querySelector('.checklist-card-body');
  const isCollapsed = body.style.display === 'none';
  body.style.display = isCollapsed ? 'block' : 'none';
  header.classList.toggle('collapsed', !isCollapsed);
}

// ============================================================
// SEARCH HANDLER
// ============================================================
async function handleSearch() {
  const input = document.getElementById('tickerInput');
  const ticker = input.value.trim().toUpperCase();
  if (!ticker) { showError('티커를 입력해주세요.'); return; }

  if (!API_KEY) { openSettings(); return; }

  showLoading(true);
  hideError();
  document.getElementById('resultArea').innerHTML = '';

  try {
    const data = await fetchStockData(ticker);
    showLoading(false);
    renderResult(data);
  } catch(e) {
    showLoading(false);
    showError(e.message);
  }
}

function quickSelect(ticker) {
  document.getElementById('tickerInput').value = ticker;
  handleSearch();
}

function showLoading(v) {
  document.getElementById('loadingBox').classList.toggle('show', v);
  document.getElementById('searchBtn').disabled = v;
}
function showError(msg) {
  const el = document.getElementById('errorBox');
  el.textContent = msg;
  el.classList.add('show');
}
function hideError() {
  document.getElementById('errorBox').classList.remove('show');
}

// ============================================================
// PORTFOLIO
// ============================================================
function addPortfolio() {
  const ticker = document.getElementById('portTicker').value.trim().toUpperCase();
  const qty = parseFloat(document.getElementById('portQty').value) || 0;
  const avg = parseFloat(document.getElementById('portAvg').value) || 0;
  if (!ticker) { alert('티커를 입력해주세요.'); return; }

  const exists = portfolio.findIndex(p => p.ticker === ticker);
  if (exists >= 0) { portfolio[exists] = { ...portfolio[exists], qty, avgPrice: avg }; }
  else { portfolio.push({ ticker, qty, avgPrice: avg, currentPrice: null, name: ticker }); }

  sessionStorage.setItem('portfolio', JSON.stringify(portfolio));
  document.getElementById('portTicker').value = '';
  document.getElementById('portQty').value = '';
  document.getElementById('portAvg').value = '';
  renderPortfolio();
}

function removePortfolio(ticker) {
  portfolio = portfolio.filter(p => p.ticker !== ticker);
  sessionStorage.setItem('portfolio', JSON.stringify(portfolio));
  renderPortfolio();
}

function renderPortfolio() {
  const tbody = document.getElementById('portTableBody');
  const empty = document.getElementById('portEmpty');
  const table = document.getElementById('portTable');

  if (portfolio.length === 0) {
    empty.style.display = 'block';
    table.style.display = 'none';
    document.getElementById('portSummary').innerHTML = '';
    return;
  }
  empty.style.display = 'none';
  table.style.display = 'table';

  tbody.innerHTML = portfolio.map(p => {
    const cur = p.currentPrice;
    const gain = cur && p.avgPrice ? ((cur - p.avgPrice) / p.avgPrice * 100) : null;
    const val = cur && p.qty ? cur * p.qty : null;
    return `
    <tr>
      <td><span class="port-ticker">${p.ticker}</span></td>
      <td>${p.qty}</td>
      <td>$${p.avgPrice.toFixed(2)}</td>
      <td>${cur ? `$${cur.toFixed(2)}` : '<span class="no-data">미조회</span>'}</td>
      <td style="color:${gain===null?'var(--text3)':gain>=0?'var(--green)':'var(--red)'}">
        ${gain !== null ? `${gain>=0?'+':''}${gain.toFixed(2)}%` : '—'}
      </td>
      <td>${val ? `$${val.toFixed(2)}` : '—'}</td>
      <td><button class="port-delete" onclick="removePortfolio('${p.ticker}')">삭제</button></td>
    </tr>`;
  }).join('');

  // Summary
  const total = portfolio.reduce((a, p) => a + (p.currentPrice && p.qty ? p.currentPrice * p.qty : 0), 0);
  const cost = portfolio.reduce((a, p) => a + (p.avgPrice && p.qty ? p.avgPrice * p.qty : 0), 0);
  const totalGain = cost > 0 ? (total - cost) / cost * 100 : 0;

  document.getElementById('portSummary').innerHTML = `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 20px;display:flex;gap:24px;flex-wrap:wrap;">
      <div><div style="font-size:11px;color:var(--text3);">총 보유 종목</div><div style="font-size:18px;font-weight:700;">${portfolio.length}개</div></div>
      ${total > 0 ? `<div><div style="font-size:11px;color:var(--text3);">평가금액</div><div style="font-size:18px;font-weight:700;font-family:'JetBrains Mono',monospace;">$${total.toFixed(2)}</div></div>` : ''}
      ${cost > 0 && total > 0 ? `<div><div style="font-size:11px;color:var(--text3);">수익률</div><div style="font-size:18px;font-weight:700;color:${totalGain>=0?'var(--green)':'var(--red)'};">${totalGain>=0?'+':''}${totalGain.toFixed(2)}%</div></div>` : ''}
      <div style="margin-left:auto;align-self:center;font-size:12px;color:var(--text3);">현재가는 종목 분석 후 자동 반영됩니다</div>
    </div>`;
}

// ============================================================
// MEMO
// ============================================================
const TEMPLATES = {
  buy: '📈 매수 근거\n- \n- \n\n',
  sell: '📉 매도 기준\n- 목표가: $\n- 손절 기준: $\n- 비중 축소 조건:\n\n',
  risk: '⚠️ 리스크 요인\n- \n- \n\n',
  watch: '👀 모니터링 포인트\n- 다음 실적 발표: \n- 주요 이벤트: \n- 확인할 지표: \n\n'
};

function insertTemplate(type) {
  const ta = document.getElementById('memoTextarea');
  ta.value += TEMPLATES[type];
  ta.focus();
}

function newMemo() {
  currentMemoId = null;
  document.getElementById('memoTickerInput').value = '';
  document.getElementById('memoTextarea').value = '';
  document.getElementById('memoDeleteBtn').style.display = 'none';
  renderMemoList();
}

function saveMemo() {
  const ticker = document.getElementById('memoTickerInput').value.trim().toUpperCase();
  const text = document.getElementById('memoTextarea').value.trim();
  if (!ticker) { alert('티커를 입력해주세요.'); return; }
  if (!text) { alert('메모 내용을 입력해주세요.'); return; }

  if (currentMemoId) {
    const idx = memos.findIndex(m => m.id === currentMemoId);
    if (idx >= 0) { memos[idx] = { ...memos[idx], ticker, text, date: new Date().toLocaleDateString('ko-KR') }; }
  } else {
    currentMemoId = Date.now().toString();
    memos.unshift({ id: currentMemoId, ticker, text, date: new Date().toLocaleDateString('ko-KR') });
  }

  sessionStorage.setItem('memos', JSON.stringify(memos));
  document.getElementById('memoDeleteBtn').style.display = 'block';
  renderMemoList();
}

function deleteMemo() {
  if (!currentMemoId) return;
  if (!confirm('이 메모를 삭제할까요?')) return;
  memos = memos.filter(m => m.id !== currentMemoId);
  sessionStorage.setItem('memos', JSON.stringify(memos));
  currentMemoId = null;
  newMemo();
}

function loadMemo(id) {
  const memo = memos.find(m => m.id === id);
  if (!memo) return;
  currentMemoId = id;
  document.getElementById('memoTickerInput').value = memo.ticker;
  document.getElementById('memoTextarea').value = memo.text;
  document.getElementById('memoDeleteBtn').style.display = 'block';
  renderMemoList();
}

function renderMemoList() {
  const container = document.getElementById('memoListItems');
  if (memos.length === 0) {
    container.innerHTML = '<div class="memo-empty">아직 메모가 없습니다.<br>종목 분석 후 메모를 작성해보세요.</div>';
    return;
  }
  container.innerHTML = memos.map(m => `
    <div class="memo-list-item ${m.id === currentMemoId ? 'active' : ''}" onclick="loadMemo('${m.id}')">
      <div class="memo-item-ticker">${m.ticker}</div>
      <div class="memo-item-preview">${m.text.replace(/\n/g,' ').substring(0,50)}</div>
      <div class="memo-item-date">${m.date}</div>
    </div>
  `).join('');
}

function openMemoFor(ticker) {
  switchTab('memo');
  const existing = memos.find(m => m.ticker === ticker);
  if (existing) { loadMemo(existing.id); }
  else {
    newMemo();
    document.getElementById('memoTickerInput').value = ticker;
  }
}

// 분석 결과에서 포트폴리오 현재가 업데이트
const _origRender = renderResult;
window.renderResult = function(s) {
  _origRender(s);
  const idx = portfolio.findIndex(p => p.ticker === s.ticker);
  if (idx >= 0) {
    portfolio[idx].currentPrice = s.price;
    portfolio[idx].name = s.name;
    sessionStorage.setItem('portfolio', JSON.stringify(portfolio));
  }
};
</script>
</body>
